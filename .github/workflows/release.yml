name: release

# Runs on tag pushes and on manual dispatch for snapshot releases.
# CGo is required because tier-2 analysis (§7.3) links the
# tree-sitter C runtime.
#
# rc0 smoke-test scope: linux/amd64 only — the PLAN §Phase 4
# five-target matrix needs native per-OS runners or a properly
# configured cross-compile toolchain; zig-as-CC from a linux
# runner can't emit darwin binaries cleanly because the Go
# toolchain passes `-arch` flags zig rejects for its default
# `x86_64-unknown-linux-gnu` target.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Build as --snapshot (no upload)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: false
      - name: Goreleaser
        # Native linux/amd64 build — no zig / no cross-compile
        # for rc0. Expanding to the full §Phase 4 matrix is a
        # follow-up task.
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: ${{ github.event.inputs.snapshot == 'true' && 'release --snapshot --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CGO_ENABLED: "1"
